name: React Icons File Type CDN Drop Validation

on:
  workflow_dispatch:
    inputs:
      cdn-url:
        description: 'CDN item-types folder URL or filetype-ci-manifest.json URL'
        required: true
        type: string
      asset-mode:
        description: 'Asset checks to run against the CDN drop'
        required: false
        default: representative
        type: choice
        options:
          - representative
          - none

permissions:
  contents: read

jobs:
  validate-react-icons-file-type-cdn-drop:
    name: Validate react-icons-file-type CDN drop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          filter: blob:none

      - uses: actions/setup-node@v6
        with:
          node-version: 22.x

      - name: Install dependencies
        run: npm ci

      - name: Test CDN drop validator
        run: npm exec --workspace @fluentui/react-icons-file-type -- vitest run scripts/validateCdnDrop.test.js

      - name: Validate CDN drop against package ledgers
        run: >-
          node packages/react-icons-file-type/scripts/validateCdnDrop.js
          --cdn-url "${{ inputs.cdn-url }}"
          --asset-mode "${{ inputs.asset-mode }}"
          --allow-host res.cdn.office.net

      - name: Lint package
        run: npx nx run react-icons-file-type:lint

      - name: Test package
        run: npx nx run react-icons-file-type:test

      - name: Build package
        run: npx nx run react-icons-file-type:build

      - name: Bundle-size package
        run: npx nx run react-icons-file-type:bundle-size

      - name: Pack package (dry run)
        run: npm pack --workspace @fluentui/react-icons-file-type --dry-run --json
