# NOTE: This workflow pre-releases an explicitly selected set of npm packages.
# Packages are chosen via the `projects` input using Nx project-selection syntax
# (names, globs, or `tag:` selectors). Private packages (`tag:npm:private`) are excluded
# by default; publishable runtime dependencies of the selection are auto-included so the
# published set is self-consistent.

name: Publish Prerelease NPM

on:
  workflow_dispatch:
    inputs:
      projects:
        description: 'Packages to pre-release (Nx selection syntax, comma/space delimited). e.g. "react-icons", "react-icons,react-icons-file-type", "react-*", "tag:npm:standalone"'
        required: true
        type: string
      exclude:
        description: 'Optional Nx selection to exclude from the resolved set (e.g. "react-native-icons")'
        required: false
        default: ''
        type: string
      preid:
        description: 'Prerelease identifier used for npm version, not dist-tag (e.g., alpha, beta, rc)'
        required: false
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - rc
      dry-run:
        description: 'Dry run (simulate release without actually publishing)'
        required: false
        default: false
        type: boolean

jobs:
  publish-prerelease:
    if: ${{ github.repository_owner == 'microsoft' }}
    name: Publish prerelease packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate branch
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "❌ ERROR: Prerelease workflow cannot be run against the main branch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please run this workflow on a feature or release branch." >> $GITHUB_STEP_SUMMARY
            echo "For more information, see: https://github.com/microsoft/fluentui-system-icons/blob/main/packages/react-icons/docs/prerelease.md" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # Resolve the user selection into concrete, publishable Nx project names, then expand with any
      # publishable runtime workspace dependencies so the published closure is self-consistent
      # (a published package never references an unpublished workspace version).
      - name: Resolve release projects
        id: projects
        env:
          PROJECTS_INPUT: ${{ inputs.projects }}
          EXCLUDE_INPUT: ${{ inputs.exclude }}
        run: |
          EXCLUDE_ARGS=(--exclude "tag:npm:private")
          if [ -n "$EXCLUDE_INPUT" ]; then
            EXCLUDE_ARGS+=(--exclude "$EXCLUDE_INPUT")
          fi

          SELECTED=$(npx nx show projects -p "$PROJECTS_INPUT" "${EXCLUDE_ARGS[@]}" --sep ',')
          if [ -z "$SELECTED" ]; then
            echo "❌ ERROR: No publishable projects matched '$PROJECTS_INPUT' (after excluding tag:npm:private)." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          NX_NAMES=$(node .github/scripts/expand-release-projects.js --projects "$SELECTED")
          echo "Resolved projects: $NX_NAMES"
          echo "nx-names=$NX_NAMES" >> "$GITHUB_OUTPUT"

      - name: Build packages
        env:
          NX_NAMES: ${{ steps.projects.outputs.nx-names }}
        run: |
          npx nx run-many -t build --projects="$NX_NAMES"

      #  NOTE:
      #   We calculate each package's next prerelease version independently before writing package.json.
      #   This repo does not set per-package git tags, so we cannot rely on Nx's default version resolution;
      #   versions are derived from the npm registry (see calculate-prerelease-version.js).
      - name: Calculate prerelease versions
        id: versions
        env:
          PREID: ${{ inputs.preid }}
          NX_NAMES: ${{ steps.projects.outputs.nx-names }}
        run: |
          node .github/scripts/calculate-prerelease-version.js \
            --preid "$PREID" \
            --projects "$NX_NAMES" \
            --out prerelease-versions.json

      # Apply the computed versions and synchronize cross-package runtime dependency references so no
      # published package points at an unpublished workspace version. In dry-run the changes are only
      # logged (not written); the plan is surfaced in the run summary either way.
      - name: Apply prerelease versions
        run: |
          node .github/scripts/apply-prerelease-versions.js \
            --in prerelease-versions.json \
            --dry-run=${{ inputs.dry-run }}

      - name: Publish to npm (Nx Release)
        env:
          NX_NAMES: ${{ steps.projects.outputs.nx-names }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npx nx release publish \
            --projects="$NX_NAMES" \
            --tag prerelease \
            --access public \
            --dry-run=${{ inputs.dry-run }} \
            --verbose

      - name: Summary
        run: |
          if [ "${{ inputs.dry-run }}" == "true" ]; then
            echo "### 🧪 Dry Run Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Mode:** Simulation (no actual publish)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Prerelease Published" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** prerelease" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Packages:**" >> $GITHUB_STEP_SUMMARY
          echo -e "${{ steps.versions.outputs.summary }}" | while IFS= read -r line; do
            [ -z "$line" ] && continue
            echo "- $line" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry-run }}" == "false" ]; then
            echo "Install with:" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo -e "${{ steps.versions.outputs.summary }}" | while IFS= read -r line; do
              [ -z "$line" ] && continue
              echo "npm install $line" >> $GITHUB_STEP_SUMMARY
            done
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
