name: Publish Standalone Packages

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run in dry-run mode (no publishing, no git commits)'
        required: false
        default: false
        type: boolean

# Serialize all automated writers to `main` (this workflow and publish.yml share the
# same group) so their pushes can never race and clobber each other.
# `cancel-in-progress: false` queues runs instead of cancelling them.
concurrency:
  group: main-writer
  cancel-in-progress: false

jobs:
  publish-standalone:
    # Prevent infinite loops: skip if the commit was made by the build system itself
    if: "!contains(github.event.head_commit.author.email, 'flubuild@microsoft.com')"
    name: Publish standalone packages
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Validate branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "❌ ERROR: This workflow can only be run on the main branch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Current ref: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_FLUENT_CI_APP_ID }}
          private-key: ${{ secrets.GH_FLUENT_CI_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          token: ${{ steps.generate-token.outputs.token }}
          # Nx (release changelog / affected) needs the full commit history to resolve
          # ranges between release tags. On this gigantic repo we keep the checkout cheap
          # via a `tree:0` partial clone: full history is present, but trees/blobs are
          # fetched on demand instead of a fragile `fetch-depth: 50` window that breaks
          # once more than 50 commits land between releases.
          # See https://github.com/nrwl/nx-set-shas#usage (fetch-depth: 0 + filter: tree:0).
          filter: tree:0
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v7
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Resolve standalone projects
        id: projects
        run: |
          # Intersect `npm:standalone` with the Nx-inferred `npm:public` tag (derived from each
          # package.json `private` field) so private packages (e.g. react-icons-file-type) — which
          # belong to the standalone release group only for pre-release versioning — are never
          # versioned/changelogged/published/tagged by this public release workflow.
          NX_NAMES=$(npx nx show projects -p "tag:npm:standalone" --exclude "tag:npm:private" --sep ',')
          echo "nx-names=$NX_NAMES" >> "$GITHUB_OUTPUT"
          echo "### Standalone projects (publishable)" >> $GITHUB_STEP_SUMMARY
          echo "$NX_NAMES" | tr ',' '\n' | while read -r p; do echo "- $p" >> $GITHUB_STEP_SUMMARY; done

      - name: Build packages
        run: |
          npx nx run-many -t build --projects=${{ steps.projects.outputs.nx-names }}

      - name: Version packages (Nx Release)
        run: |
          npx nx release version --projects=${{ steps.projects.outputs.nx-names }} --verbose

      - name: Resolve released projects (new versions this run)
        id: released
        # `nx release version` only bumps packages with releasable conventional-commit changes;
        # unchanged packages keep their version (and therefore their existing tag). We treat
        # "the {pkg}@{version} tag already exists" as "this version was already released" and drop
        # it from the set. Every downstream step (changelog, publish, tag) operates on this single
        # source of truth, which also makes re-runs idempotent: a re-run after a partial failure
        # only re-processes the versions that were not yet tagged.
        run: |
          RELEASED=""
          for pkg in $(echo "${{ steps.projects.outputs.nx-names }}" | tr ',' '\n'); do
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            TAG="${pkg}@${VERSION}"
            if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
              echo "Skipping ${TAG} — already released (tag exists)"
              continue
            fi
            RELEASED="${RELEASED:+$RELEASED,}$pkg"
          done
          echo "names=$RELEASED" >> "$GITHUB_OUTPUT"
          echo "### Released projects (new versions this run)" >> $GITHUB_STEP_SUMMARY
          if [ -z "$RELEASED" ]; then
            echo "- (none — all targeted packages already released)" >> $GITHUB_STEP_SUMMARY
          else
            echo "$RELEASED" | tr ',' '\n' | while read -r p; do echo "- $p" >> $GITHUB_STEP_SUMMARY; done
          fi

      - name: Generate changelogs (Nx Release)
        # --first-release: allows changelog generation when no prior git tag exists (first release).
        # Safe to keep permanently — once per-package tags exist, they take priority and this flag becomes a no-op.
        # Scoped here instead of global nx.json `automaticFromRef` to avoid masking tag-resolution failures in other release groups.
        # Operates on the already-filtered released set (see "Resolve released projects").
        run: |
          for pkg in $(echo "${{ steps.released.outputs.names }}" | tr ',' '\n'); do
            [ -z "$pkg" ] && continue
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            echo "Generating changelog for ${pkg}@${VERSION}"
            npx nx release changelog "$VERSION" --projects="$pkg" --first-release --no-git-tag --no-git-commit --verbose
          done

      - name: Update lockfile
        run: npm install --package-lock-only

      - name: Publish to npm (Nx Release)
        if: ${{ !inputs.dry-run && steps.released.outputs.names != '' }}
        run: |
          npx nx release publish --projects=${{ steps.released.outputs.names }} --access public --verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Config git credentials
        run: git config user.email "flubuild@microsoft.com" && git config user.name "Fluent Build System"

      - name: Commit version changes
        if: ${{ !inputs.dry-run }}
        run: |
          git add -A
          # Guard against an empty commit: if every targeted package was unchanged there is
          # nothing staged, and `git commit` would fail the job. Skip cleanly instead.
          if git diff --cached --quiet; then
            echo "No release changes to commit — all targeted packages were already released"
          else
            git commit -m "chore(release): publish standalone packages [skip ci]"
          fi

      - name: Push release commit
        if: ${{ !inputs.dry-run }}
        run: |
          set -euo pipefail
          # Re-sync ONLY here (never rebuild): replay the already-built release commit onto
          # the latest main. main can advance during the long build via any writer — another
          # automated job or a PR merge. Those changes are normally disjoint from a release
          # commit, so this replays cleanly and keeps the just-published artifacts byte-for-
          # byte. A genuine conflict aborts the job instead of silently mutating a published
          # artifact.
          git fetch origin main
          git rebase origin/main
          # Branch FIRST: push the commit, then (in the next step) tag the SHA now guaranteed
          # on main. This ordering makes an orphaned tag impossible and fails closed if main
          # moved in the interim — just re-run to retry.
          git push origin HEAD:main

      - name: Tag releases
        # Tags are created manually (git.tag: false in nx.json) AFTER the release commit is
        # pushed to main (previous step), so each tag points at a SHA already on main — an
        # orphaned tag (tag without its commit on main) is therefore impossible. Tagging after
        # the rebase/push also guarantees the tag targets the rebased commit, not a stale SHA.
        # nx.json uses granular `version.git`/`changelog.git` config, which the unified
        # `nx release` command (the only variant that natively skips unchanged packages when
        # tagging) refuses to run with; migrating to top-level `release.git` would also alter
        # the sub-command flow that publish.yml depends on. So we tag here, over the already-
        # filtered released set (see "Resolve released projects") — so an unchanged/already-
        # tagged package can never abort the job, and re-runs after a partial failure only
        # create the missing tags. Tags are pushed explicitly (never --tags/--follow-tags,
        # which push tags independently of the branch, so a rejected branch push could still
        # leave a tag pointing at a commit not on main).
        if: ${{ !inputs.dry-run }}
        run: |
          set -euo pipefail
          for pkg in $(echo "${{ steps.released.outputs.names }}" | tr ',' '\n'); do
            [ -z "$pkg" ] && continue
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            TAG="${pkg}@${VERSION}"
            echo "Creating and pushing tag: $TAG"
            git tag "$TAG"
            git push origin "refs/tags/$TAG"
          done

      - name: Dry-run summary
        if: ${{ inputs.dry-run }}
        # Mirrors the real run exactly: only the change-aware "released" set (see "Resolve released
        # projects") is published/committed/tagged. Unchanged/already-released packages are listed
        # separately as skipped, so the summary reflects what would actually happen — not the full
        # candidate list.
        run: |
          RELEASED="${{ steps.released.outputs.names }}"

          echo "## 🧪 Dry-run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📦 Packages that would be published" >> $GITHUB_STEP_SUMMARY
          echo "_nx release publish additionally skips any version already on the npm registry._" >> $GITHUB_STEP_SUMMARY
          if [ -z "$RELEASED" ]; then
            echo "- (none — every targeted package is already released)" >> $GITHUB_STEP_SUMMARY
          else
            for pkg in $(echo "$RELEASED" | tr ',' '\n'); do
              VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
              NAME=$(node -p "require('./packages/${pkg}/package.json').name")
              echo "- \`${NAME}@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
            done
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### ⏭️ Packages skipped (tag already exists — no new release)" >> $GITHUB_STEP_SUMMARY
          SKIPPED_ANY=false
          for pkg in $(echo "${{ steps.projects.outputs.nx-names }}" | tr ',' '\n'); do
            case ",$RELEASED," in
              *",$pkg,"*) continue ;;
            esac
            VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            NAME=$(node -p "require('./packages/${pkg}/package.json').name")
            echo "- \`${NAME}@${VERSION}\` (tag \`${pkg}@${VERSION}\` already exists)" >> $GITHUB_STEP_SUMMARY
            SKIPPED_ANY=true
          done
          [ "$SKIPPED_ANY" = false ] && echo "- (none)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🏷️ Git operations that would be performed" >> $GITHUB_STEP_SUMMARY
          if [ -z "$RELEASED" ]; then
            echo "- Commit: _(skipped — nothing to commit)_" >> $GITHUB_STEP_SUMMARY
            echo "- Tags: _(none)_" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Commit: \`chore(release): publish standalone packages [skip ci]\`" >> $GITHUB_STEP_SUMMARY
            for pkg in $(echo "$RELEASED" | tr ',' '\n'); do
              VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
              echo "- Tag: \`${pkg}@${VERSION}\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "- Push to: \`origin/main\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📝 Files modified (not committed)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git status --short >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Stage changed package files
        if: ${{ inputs.dry-run }}
        run: |
          mkdir -p /tmp/changed-packages
          git status --porcelain -- 'packages/' | awk '{print $NF}' | xargs -I{} cp --parents {} /tmp/changed-packages/ 2>/dev/null || true
          cp package.json package-lock.json /tmp/changed-packages/

      - name: Upload changed package files
        if: ${{ inputs.dry-run }}
        uses: actions/upload-artifact@v7
        with:
          name: changed-packages-files
          path: /tmp/changed-packages/
          if-no-files-found: warn
